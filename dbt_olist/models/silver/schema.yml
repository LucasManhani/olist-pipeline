version: 2

models:
  - name: silver_orders
    description: "Pedidos limpos com nomes padronizados"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_customers')
                field: customer_id

  - name: silver_customers
    description: "Clientes com cidade e estado padronizados"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: silver_order_items
    description: "Itens dos pedidos"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_products')
                field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_sellers')
                field: seller_id

  - name: silver_order_payments
    description: "Pagamentos dos pedidos"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id
      - name: payment_sequential
        tests:
          - not_null

  - name: silver_order_reviews
    description: "Avaliações dos pedidos"
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id

  - name: silver_products
    description: "Produtos com medidas físicas"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: silver_sellers
    description: "Vendedores com cidade e estado padronizados"
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: silver_geolocation
    description: "Geolocalização agregada por CEP"
    columns:
      - name: location_zip_code
        tests:
          - unique
          - not_null

  - name: silver_product_category_name_translation
    description: "Tradução de categorias para inglês"
    columns:
      - name: product_category_name
        tests:
          - unique
          - not_null
